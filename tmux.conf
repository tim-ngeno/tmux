########################################
# Shell
########################################

set-option -g default-shell /usr/bin/fish
set-option -g default-command /usr/bin/fish

########################################
# General behaviour
########################################

set -g mouse on
set -g set-clipboard on
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -g base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g allow-rename off

set -g @resurrect-capture-pane-contents 'on'

########################################
# Keybindings
########################################

# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"


# Resurrect save/restore
bind-key C-s run-shell "~/.config/tmux/plugins/tmux-resurrect/scripts/save.sh" \; display "Session saved"
bind-key C-r run-shell "~/.config/tmux/plugins/tmux-resurrect/scripts/restore.sh" \; display "Session restored"


# Splits
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Leet-speak rename for windows (vowels only)
bind , command-prompt -I "#{window_name}" -p "rename window:" \
    "run-shell \"tmux rename-window \\\"\$(echo '%1' | sed 's/a/4/gi;s/e/3/gi;s/i/1/gi;s/o/0/gi;s/u/v/gi')\\\"\""

# Leet-speak rename for panes (prefix + <)
bind < command-prompt -I "#{pane_title}" -p "rename pane:" \
    "run-shell \"tmux select-pane -T \\\"\$(echo '%1' | sed 's/a/4/gi;s/e/3/gi;s/i/1/gi;s/o/0/gi;s/u/v/gi')\\\"\""

# Emacs copy mode
set -g mode-keys emacs
set -g status-keys emacs

########################################
# Plugins
########################################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

# Plugin Config
set -g @sessionx-bind 'o'
set -g @floax-bind 'p'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'


########################################
# Pywal/Kitty Colors
########################################

if-shell "[ -f ~/.cache/wal/colors-kitty ]" "source-file ~/.cache/wal/colors-kitty"

########################################
# Status bar
########################################

set -g status-position bottom
set -g status-justify centre
set -g status-interval 5
set -g status-left-length  60
set -g status-right-length 120
set -g status-style "bg=default"

# Single status row
set -g status on

# ── left: session pill ────────────────────────────────────────────
set -g status-left "#(~/.config/tmux/scripts/session_pill.sh #S)"

# ── center: window pills ──────────────────────────────────────────
set -g window-status-separator " "

set -g window-status-format \
  "#[fg=colour8,bg=default]#[fg=colour7,bg=colour8]#I #W#[fg=colour8,bg=default]#[default]"

set -g window-status-current-format \
  "#[fg=colour2,bg=default]#[fg=colour0,bg=colour2,bold]#I#[fg=colour2,bg=colour8]█#[fg=colour15,bg=colour8,bold] #W #[fg=colour8,bg=default]#[default]"

set -g window-status-activity-style "bg=colour1,fg=colour15,bold"

# ── right: git | clock ───────────────────────────
set -g status-right "#(~/.config/tmux/scripts/git_branch.sh #{pane_current_path}) #[fg=colour15,bold]⏱ %H:%M "

# ── pane borders ──────────────────────────────────────────────────────────────
set -g pane-border-style        "fg=colour0"
set -g pane-active-border-style "fg=colour4"

########################################
# Precompute session colors
########################################

run-shell "~/.config/tmux/scripts/session_colors_map.sh"

########################################
# TPM — lazy install with prefix + I
########################################

bind I run '~/.config/tmux/plugins/tpm/tpm'
